<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Capultura Golden E2E Page</title>
  </head>
  <body>
    <main>
      <h1>Capultura Golden E2E Page</h1>

      <button id="search-btn" type="button">Search</button>
      <div id="search-result" role="status"></div>

      <form id="login-form">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" value="" />
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          value=""
        />
        <button id="submit-login" type="button">Submit</button>
      </form>
      <div id="login-result" role="status"></div>
    </main>

    <script>
      const searchButton = document.querySelector('#search-btn')
      const searchResult = document.querySelector('#search-result')
      const loginForm = document.querySelector('#login-form')
      const usernameInput = document.querySelector('#username')
      const passwordInput = document.querySelector('#password')
      const loginResult = document.querySelector('#login-result')

      const submitLoginButton = document.querySelector('#submit-login')

      searchButton.addEventListener('click', async () => {
        const response = await fetch('/api/search?term=gold', {
          method: 'GET',
          headers: { accept: 'application/json' },
        })
        const body = await response.json()
        searchResult.textContent = body.message
      })

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault()
        await submitLogin()
      })

      submitLoginButton.addEventListener('click', submitLogin)

      async function submitLogin() {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            accept: 'application/json',
            'content-type': 'application/json',
          },
          body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value,
          }),
        })
        const body = await response.json()
        loginResult.textContent = body.message
      }
    </script>
  </body>
</html>
