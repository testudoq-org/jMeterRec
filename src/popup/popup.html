<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capultura</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <h1>Capultura</h1>

    <section class="card" aria-labelledby="recorderTitle">
      <div class="card-header">
        <div>
          <h2 id="recorderTitle" class="sr-only">Recorder controls</h2>
          <div class="settings-row">
            <div class="field">
              <label for="planName">Plan name</label>
              <input id="planName" type="text" autocomplete="off" />
            </div>
            <div class="field">
              <label for="themeMode">Theme</label>
              <select id="themeMode">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </div>
          </div>
          <div id="status" class="status status-idle" aria-live="polite">
            Loading recorder state…
          </div>
          <div id="elapsedTime" class="elapsed" aria-live="polite">Elapsed: 00:00</div>
        </div>
      </div>

      <div class="row">
        <button id="start" type="button">Start</button>
        <button id="pause" class="secondary" type="button">Pause</button>
        <button id="resume" class="secondary" type="button">Resume</button>
      </div>

      <div class="row">
        <button id="stop" class="danger" type="button">Stop</button>
        <label for="exportMode" class="sr-only">Export format</label>
        <select id="exportMode">
          <option value="jmx">JMX</option>
          <option value="playwright">Playwright</option>
        </select>
        <button id="export" class="secondary" type="button">Export</button>
      </div>

      <div id="jmxOptions" style="display: none">
        <fieldset>
          <legend>Domains to include</legend>
          <div id="jmxDomains" class="domain-list"></div>
          <div id="jmxDomainStatus" class="domain-status"></div>
          <div id="jmxDomainError" class="error" aria-live="polite"></div>
          <button id="exportJmxSelected" class="secondary" disabled type="button">
            Export selected domains
          </button>
        </fieldset>
      </div>

      <div id="playwrightOptions" style="display: none">
        <label for="baseUrl">Base URL</label>
        <input id="baseUrl" type="text" placeholder="https://example.com" autocomplete="off" />
      </div>

      <div class="row">
        <button id="clear" class="secondary" type="button">Clear</button>
      </div>
    </section>

    <div id="error" class="error" aria-live="polite"></div>

    <section
      id="capultura-transaction-panel"
      class="transaction-panel"
      aria-labelledby="transactionPanelTitle"
    >
      <div class="transaction-panel__header">
        <div>
          <h2 id="transactionPanelTitle">Live transactions</h2>
          <p id="transactionSummary" class="muted">No requests captured yet.</p>
        </div>
        <button id="openDetachedInspector" class="secondary" type="button">Detach</button>
      </div>

      <div class="transaction-filters" role="search" aria-label="Filter transactions">
        <label for="transactionMethodFilter">Method</label>
        <select id="transactionMethodFilter">
          <option value="all">All</option>
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="PATCH">PATCH</option>
          <option value="DELETE">DELETE</option>
        </select>

        <label for="transactionStatusFilter">Status</label>
        <select id="transactionStatusFilter">
          <option value="all">All</option>
          <option value="2xx">2xx</option>
          <option value="3xx">3xx</option>
          <option value="4xx">4xx</option>
          <option value="5xx">5xx</option>
          <option value="error">Error</option>
        </select>

        <label for="transactionSearch">Search URL</label>
        <input
          id="transactionSearch"
          type="search"
          autocomplete="off"
          placeholder="example.com/api"
        />
      </div>

      <div
        id="transactionList"
        class="transaction-list"
        role="list"
        aria-label="Recent HTTP transactions"
      ></div>
    </section>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
